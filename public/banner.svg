<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MoodBoard animated banner</title>
<desc>Animated SVG banner for MoodBoard GitHub README</desc>
<defs>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse  { 0%,100% { opacity:.7; } 50% { opacity:1; } }
    @keyframes orbit  { from { transform:rotate(0deg) translateX(38px) rotate(0deg); } to { transform:rotate(360deg) translateX(38px) rotate(-360deg); } }
    @keyframes blink  { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    @keyframes slide  { from { stroke-dashoffset:300; } to { stroke-dashoffset:0; } }
    .t0  { animation: fadeUp .5s ease both .1s; }
    .t1  { animation: fadeUp .5s ease both .4s; }
    .t2  { animation: fadeUp .5s ease both .7s; }
    .t3  { animation: fadeUp .5s ease both .9s; }
    .t4  { animation: fadeUp .5s ease both 1.1s; }
    .t5  { animation: fadeUp .5s ease both 1.3s; }
    .t6  { animation: fadeUp .5s ease both 1.5s; }
    .t7  { animation: fadeUp .5s ease both 1.7s; }
    .moon { animation: pulse 3s ease-in-out infinite; }
    .dot  { animation: blink 2s ease-in-out infinite; }
    .line { stroke-dasharray:300; animation: slide 1.2s ease both .6s; }
    .orb  { transform-origin:310px 70px; animation: orbit 8s linear infinite; }
  </style>
</defs>
<rect width="680" height="320" rx="16" fill="#1a1333"/>
<g opacity=".06" stroke="#9d8fe0" stroke-width=".5">
  <line x1="0" y1="80"  x2="680" y2="80"/>
  <line x1="0" y1="160" x2="680" y2="160"/>
  <line x1="0" y1="240" x2="680" y2="240"/>
  <line x1="170" y1="0" x2="170" y2="320"/>
  <line x1="340" y1="0" x2="340" y2="320"/>
  <line x1="510" y1="0" x2="510" y2="320"/>
</g>
<g class="orb">
  <circle cx="310" cy="70" r="4" fill="#a78bfa" opacity=".8"/>
</g>
<g class="t0 moon">
  <circle cx="310" cy="70" r="28" fill="#2d1f5e"/>
  <circle cx="310" cy="70" r="22" fill="#4c1d95"/>
  <text x="310" y="78" text-anchor="middle" font-size="22" font-family="sans-serif">🌙</text>
</g>
<g class="t1">
  <text x="340" y="124" text-anchor="middle" font-size="28" font-weight="600" fill="#f5f3ff" font-family="Georgia, serif" letter-spacing="-0.5">MoodBoard</text>
</g>
<g class="t2">
  <text x="340" y="148" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="sans-serif">Privacy-first mood tracker · Self-hosted · AI-powered</text>
</g>
<line class="line" x1="180" y1="165" x2="500" y2="165" stroke="#4c1d95" stroke-width="1"/>
<circle class="dot" cx="340" cy="165" r="3" fill="#7c3aed" style="animation-delay:.2s"/>
<circle class="dot" cx="280" cy="165" r="2" fill="#7c3aed" opacity=".5" style="animation-delay:.6s"/>
<circle class="dot" cx="400" cy="165" r="2" fill="#7c3aed" opacity=".5" style="animation-delay:1s"/>
<g class="t4">
  <rect x="40" y="182" width="140" height="110" rx="10" fill="#2d1f5e" stroke="#4c1d95" stroke-width=".8"/>
  <text x="110" y="206" text-anchor="middle" font-size="20" font-family="sans-serif">🎭</text>
  <text x="110" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd" font-family="sans-serif">Auto-Detect</text>
  <text x="110" y="246" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">Face expression</text>
  <text x="110" y="260" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">reads your mood</text>
  <rect x="60" y="272" width="100" height="12" rx="6" fill="#4c1d95"/>
  <rect x="60" y="272" width="80" height="12" rx="6" fill="#7c3aed"/>
  <text x="110" y="282" text-anchor="middle" font-size="8" fill="#ddd6fe" font-family="sans-serif">AI Powered</text>
</g>
<g class="t5">
  <rect x="200" y="182" width="140" height="110" rx="10" fill="#2d1f5e" stroke="#4c1d95" stroke-width=".8"/>
  <text x="270" y="206" text-anchor="middle" font-size="20" font-family="sans-serif">🎵</text>
  <text x="270" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd" font-family="sans-serif">Spotify Match</text>
  <text x="270" y="246" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">Playlist matched</text>
  <text x="270" y="260" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">to your mood</text>
  <rect x="220" y="272" width="100" height="12" rx="6" fill="#4c1d95"/>
  <rect x="220" y="272" width="70" height="12" rx="6" fill="#1db954"/>
  <text x="270" y="282" text-anchor="middle" font-size="8" fill="#ddd6fe" font-family="sans-serif">Spotify API</text>
</g>
<g class="t6">
  <rect x="360" y="182" width="140" height="110" rx="10" fill="#2d1f5e" stroke="#4c1d95" stroke-width=".8"/>
  <text x="430" y="206" text-anchor="middle" font-size="20" font-family="sans-serif">🧠</text>
  <text x="430" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd" font-family="sans-serif">AI Therapist</text>
  <text x="430" y="246" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">Wellness tips &amp;</text>
  <text x="430" y="260" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">mood suggestions</text>
  <rect x="380" y="272" width="100" height="12" rx="6" fill="#4c1d95"/>
  <rect x="380" y="272" width="90" height="12" rx="6" fill="#7c3aed"/>
  <text x="430" y="282" text-anchor="middle" font-size="8" fill="#ddd6fe" font-family="sans-serif">Claude AI</text>
</g>
<g class="t7">
  <rect x="520" y="182" width="140" height="110" rx="10" fill="#2d1f5e" stroke="#4c1d95" stroke-width=".8"/>
  <text x="590" y="206" text-anchor="middle" font-size="20" font-family="sans-serif">🎙️</text>
  <text x="590" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd" font-family="sans-serif">Voice Entry</text>
  <text x="590" y="246" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">Speak to journal</text>
  <text x="590" y="260" text-anchor="middle" font-size="10" fill="#8b7cc8" font-family="sans-serif">hands-free</text>
  <rect x="540" y="272" width="100" height="12" rx="6" fill="#4c1d95"/>
  <rect x="540" y="272" width="60" height="12" rx="6" fill="#7c3aed"/>
  <text x="590" y="282" text-anchor="middle" font-size="8" fill="#ddd6fe" font-family="sans-serif">Speech API</text>
</g>
<g class="t7">
  <text x="340" y="310" text-anchor="middle" font-size="10" fill="#6d5ca8" font-family="sans-serif">Your data · Your server · Your rules · No ads · No subscriptions</text>
</g>
</svg>
