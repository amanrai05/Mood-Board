# Production Docker Compose for MoodBoard
# Use this for production deployments with better security and performance

services:
  api:
    image: ${API_IMAGE:-ghcr.io/shirsakm/moodboard-api:latest}
    container_name: moodboard-api-prod
    restart: unless-stopped
    environment:
      - RAILWAY_ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://yourdomain.com
      - ENABLE_GOOGLE_OAUTH=${ENABLE_GOOGLE_OAUTH:-0}
      - DEFAULT_SELF_HOST_ID=${DEFAULT_SELF_HOST_ID:-selfhost_default_user}
      - DATABASE_PATH=/app/data/moodboard.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      - PORT=5000
    volumes:
      - moodboard_data:/app/data
    networks:
      - moodboard-network
    # Only expose to internal network in production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    image: ${WEB_IMAGE:-ghcr.io/shirsakm/moodboard-frontend:latest}
    container_name: moodboard-frontend-prod
    restart: unless-stopped
    # Only expose to internal network in production
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - moodboard-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: moodboard-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certificates here
    depends_on:
      - frontend
      - api
    networks:
      - moodboard-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  moodboard-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  moodboard_data:
    driver: local
